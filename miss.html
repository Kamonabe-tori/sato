<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マッチング結果</title>
  <style>
    /* 全体の背景：ちょっと人を小馬鹿にしたような、でもオシャレなセピアグレー */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: #f4f1ea; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* 結果表示カード */
    .result-container {
      text-align: center;
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(139, 126, 116, 0.2);
      max-width: 420px;
      width: 90%;
      border: 3px solid #e6dfd3;
      animation: shake 0.5s ease-in-out;
    }

    /* ガーン！と画面が激しく揺れる演出 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
      20%, 40%, 60%, 80% { transform: translateX(10px); }
    }

    /* あざ笑うピエロのアニメーション */
    .icon-area {
      font-size: 5rem;
      margin-bottom: 15px;
      display: inline-block;
      animation: laugh 1s infinite alternate ease-in-out;
    }

    @keyframes laugh {
      0% { transform: scale(1) rotate(-10deg); }
      100% { transform: scale(1.2) rotate(10deg); }
    }

    h2 {
      color: #d9534f; /* 警告の赤 */
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .main-message {
      color: #4a5568;
      font-size: 1.1rem;
      font-weight: bold;
      line-height: 1.8;
      margin-bottom: 25px;
    }

    /* 煽り文句のエリア */
    .aori-box {
      background-color: #fff5f5;
      border: 2px dashed #feb2b2;
      padding: 15px;
      border-radius: 12px;
      color: #c53030;
      font-size: 0.95rem;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    /* Amazonへ強制送還するボタン */
    .amazon-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(to bottom, #f7dfa5, #f0c14b); /* Amazon風ゴールド */
      color: #111111;
      border: 1px solid #a88734;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .amazon-btn:hover {
      background: linear-gradient(to bottom, #f5d78e, #eeb933);
      border-color: #846a29;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>

<div class="result-container">
  <!-- 煽ってくるピエロ -->
  <div class="icon-area">🤡</div>
  
  <h2>マッチング失敗！！！！</h2>
  
  <div class="main-message">
    あなたに釣り合う恋人は<br>
    見つかりませんでした。
  </div>

  <!-- 煽りメッセージ -->
  <div class="aori-box">
    wwwwwwwwwwwww
  </div>

  <!-- 自分でクリックして飛ぶAmazonボタン -->
  <a href="https://www.amazon.co.jp" class="amazon-btn" id="study-link">
    ここをクリック 📖
  </a>
</div>

<script>
  // 前の画面で選択されたコースを読み込む（もしデータがなければデフォルトでマーケティングにする）
  const selectedCourse = localStorage.getItem('selectedCourse') || 'マーケティング企画コース'; 

  // 新しい5つのコース名に合わせたAmazon検索URLの設定
  const amazonSearches = {
    'スポーツマネジメントコース': 'https://www.amazon.co.jp/s?k=スポーツマネジメント+本',
    'マーケティング企画コース': 'https://www.amazon.co.jp/s?k=マーケティング+入門+参考書',
    'コンテンツビジネスコース': 'https://www.amazon.co.jp/s?k=コンテンツビジネス+著作権+本',
    'ビジネスマネジメントコース': 'https://www.amazon.co.jp/s?k=経営学+ビジネスマネジメント+参考書',
    'デジタルビジネスデザインコース': 'https://www.amazon.co.jp/s?k=DX+デジタルビジネス+デザイン+本'
  };

  // 選択されたコースに応じたAmazonの検索結果URLをボタンにセットする
  const targetUrl = amazonSearches[selectedCourse] || 'https://www.amazon.co.jp';
  document.getElementById('study-link').href = targetUrl;
</script>

</body>
</html>
